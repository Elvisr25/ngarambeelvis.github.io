<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const isLocal = ['localhost','127.0.0.1','[::1]'].includes(location.hostname);
        const src = isLocal
          ? 'http://localhost:8000/p02/IMAGES/brick_diffuse.jpg'
          : './IMAGES/brick_diffuse.jpg';

        const img = document.getElementById('bricks');
        img.setAttribute('src', src);

        document.querySelector('a-assets').addEventListener('loaded', () => {
          document.getElementById('PGB_sphere')
            .setAttribute('material', 'src: #bricks');
        });
      });
    </script>

    <a-scene>

      <a-assets>
        <img id="bricks" crossorigin="anonymous">
      </a-assets>

      <a-sphere
        id="PGB_sphere"
        position="0 1.5 -3"
        radius="1"
        rotation="0 45 0">
      </a-sphere>

    </a-scene>

  </body>
</html>
