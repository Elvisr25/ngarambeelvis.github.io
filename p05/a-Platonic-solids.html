<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <a-box position="-4 1 -3" color="#4CC3D9"></a-box>

      <a-entity position="-2 1 -3"
        geometry="primitive: tetrahedron; radius: 1"
        material="color: #EF2D5E">
      </a-entity>

      <a-entity position="0 1 -3"
        geometry="primitive: dodecahedron; radius: 1"
        material="color: #FFC65D">
      </a-entity>

      <a-entity position="2 1 -3"
        geometry="primitive: octahedron; radius: 1"
        material="color: #7BC8A4">
      </a-entity>

      <a-entity position="4 1 -3"
        geometry="primitive: icosahedron; radius: 1"
        material="color: #FFFFFF">
      </a-entity>

      <a-sky color="#000000"></a-sky>

    </a-scene>

  </body>
</html>
