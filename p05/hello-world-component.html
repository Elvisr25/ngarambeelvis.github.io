<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <script>
      AFRAME.registerComponent('say-hello', {
        init: function () {
          console.log("HELLO");
        }
      });
    </script>

    <a-scene>

      <a-box
        position="0 1 -3"
        color="#4CC3D9"
        say-hello>
      </a-box>

      <a-sky color="#000000"></a-sky>

    </a-scene>

  </body>
</html>
