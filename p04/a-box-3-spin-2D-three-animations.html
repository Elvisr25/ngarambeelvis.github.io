<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <a-box
        position="0 1 -3"
        color="#4CC3D9"
        animation__x="property: rotation; to: 360 0 0; loop: true; dur: 4000"
        animation__y="property: rotation; to: 0 360 0; loop: true; dur: 4000"
        animation__z="property: rotation; to: 0 0 360; loop: true; dur: 4000">
      </a-box>

      <a-sky color="#000000"></a-sky>

    </a-scene>

  </body>
</html>
