<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Intersecting planes</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <a-plane
        position="0 1 -3"
        rotation="-90 0 0"
        width="4"
        height="4"
        color="#7BC8A4">
      </a-plane>

      <a-plane
        position="0 1 -3"
        rotation="-45 0 0"
        width="4"
        height="4"
        color="#4CC3D9">
      </a-plane>

      <a-plane
        position="0 1 -3"
        rotation="45 0 0"
        width="4"
        height="4"
        color="#EF2D5E">
      </a-plane>

      <a-sky color="#000000"></a-sky>

    </a-scene>

  </body>
</html>
