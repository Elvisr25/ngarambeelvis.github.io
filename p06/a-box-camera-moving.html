<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <!-- Moving Camera -->
      <a-entity
        position="0 1.6 0"
        animation="property: position; to: 0 1.6 -6; dir: alternate; loop: true; dur: 4000">

        <a-entity camera look-controls></a-entity>
      </a-entity>

      <!-- Box -->
      <a-box position="0 2 -5" rotation="45 45 45" color="green"></a-box>

    </a-scene>

  </body>
</html>
