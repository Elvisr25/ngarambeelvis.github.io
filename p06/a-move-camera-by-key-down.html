<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Move Camera</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <!-- Camera with WASD movement -->
      <a-entity camera wasd-controls look-controls position="0 1.6 0"></a-entity>

      <!-- Scene -->
      <a-box position="0 1 -3" color="#4CC3D9"></a-box>
      <a-sphere position="2 1 -4" radius="1" color="#EF2D5E"></a-sphere>
      <a-cylinder position="-2 1 -4" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>

      <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>

    </a-scene>

  </body>
</html>
