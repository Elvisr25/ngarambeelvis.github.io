<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Ambient Light -->
      <a-entity light="type: ambient; color: #888; intensity: 0.7"></a-entity>

      <!-- Directional Light -->
      <a-entity light="type: directional; color: #FFFFFF; intensity: 1"
                position="1 1 1">
      </a-entity>

      <!-- Box -->
      <a-box position="0 2 -3" rotation="45 45 45" color="green"></a-box>

    </a-scene>
  </body>
</html>
