<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Earth Orbit</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <!-- Assets -->
      <a-assets>
        <img id="earth" src="./IMAGES/1_earth_8k.jpg">
      </a-assets>

      <!-- Sun -->
      <a-sphere position="0 1.5 -5" radius="1" color="yellow"></a-sphere>

      <!-- Orbit group -->
      <a-entity position="0 1.5 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">

        <!-- Earth -->
        <a-sphere
          src="#earth"
          radius="0.5"
          position="3 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        </a-sphere>

      </a-entity>

      <!-- Camera -->
      <a-entity camera wasd-controls look-controls position="0 1.6 0"></a-entity>

      <!-- Lights -->
      <a-light type="ambient" color="#888"></a-light>
      <a-light type="directional" position="-1 1 1"></a-light>

    </a-scene>

  </body>
</html>
