<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <a-box position="-3 1 -5" color="blue"
        animation="property: position; to: 3 1 -5; dur: 3000; loop: true; dir: alternate"
        animation__rotate="property: rotation; to: 0 360 0; dur: 2000; loop: true">
      </a-box>

    </a-scene>
  </body>
</html>
