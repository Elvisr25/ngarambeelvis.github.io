<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <a-box position="0 5 -5" color="blue"
        animation="property: position; to: 0 1 -5; dur: 1500; loop: true; dir: alternate">
      </a-box>

      <a-plane position="0 0 -5" rotation="-90 0 0" width="10" height="10" color="green"></a-plane>

    </a-scene>
  </body>
</html>
