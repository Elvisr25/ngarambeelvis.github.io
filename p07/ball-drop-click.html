<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <a-sphere position="0 3 -5" radius="0.5" color="red"
        animation__drop="property: position; to: 0 1 -5; dur: 1000; startEvents: click">
      </a-sphere>

      <a-plane position="0 0 -5" rotation="-90 0 0" width="10" height="10" color="green"></a-plane>

      <a-entity camera cursor="rayOrigin: mouse"></a-entity>

    </a-scene>
  </body>
</html>
