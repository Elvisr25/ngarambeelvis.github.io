<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Solar System</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- LIGHTING -->
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="point" intensity="2" position="0 1.5 -5"></a-light>

      <!-- CAMERA -->
      <a-entity camera wasd-controls look-controls position="0 1.6 6"></a-entity>

      <!-- SUN -->
      <a-sphere position="0 1.5 -5" radius="1.5" color="yellow"
        animation="property: material.color; to: orange; dir: alternate; dur: 1000; loop: true">
      </a-sphere>

      <!-- GREEN PLANET -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
        <a-sphere position="3 1.5 -5" radius="0.5" color="green"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-sphere>
      </a-entity>

      <!-- BLUE PLANET -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        <a-sphere position="5 1.5 -5" radius="0.6" color="blue"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3500">
        </a-sphere>
      </a-entity>

      <!-- RED PLANET -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        <a-sphere position="7 1.5 -5" radius="0.5" color="red"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-sphere>
      </a-entity>

      <!-- PURPLE PLANET -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
        <a-sphere position="9 1.5 -5" radius="0.7" color="purple"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4500">
        </a-sphere>
      </a-entity>

      <!-- BROWN PLANET -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 14000">
        <a-sphere position="11 1.5 -5" radius="0.6" color="brown"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-sphere>
      </a-entity>

      <!-- ORANGE PLANET -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 16000">
        <a-sphere position="13 1.5 -5" radius="0.5" color="orange"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5500">
        </a-sphere>
      </a-entity>

      <!-- SKY -->
      <a-sky color="black"></a-sky>

    </a-scene>
  </body>
</html>
