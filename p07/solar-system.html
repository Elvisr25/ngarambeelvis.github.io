<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Solar System</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <!-- Assets (replace with your own textures if required) -->
      <a-assets>
        <img id="sunTex" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        <img id="planet1Tex" src="https://cdn.aframe.io/a-painter/images/sky.jpg">
        <img id="planet2Tex" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        <img id="planet3Tex" src="https://cdn.aframe.io/a-painter/images/sky.jpg">
        <img id="planet4Tex" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <!-- SUN -->
      <a-sphere
        id="sun"
        position="0 1.6 -6"
        radius="1.5"
        src="#sunTex"
        animation__color="property: material.color; dir: alternate; dur: 2000; loop: true; to: orange">
      </a-sphere>

      <!-- PLANET 1 -->
      <a-entity position="0 1.6 -6"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">

        <a-sphere radius="0.3" position="2 0 0" src="#planet1Tex"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        </a-sphere>

      </a-entity>

      <!-- PLANET 2 -->
      <a-entity position="0 1.6 -6"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">

        <a-sphere radius="0.4" position="3 0 0" src="#planet2Tex"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-sphere>

      </a-entity>

      <!-- PLANET 3 -->
      <a-entity position="0 1.6 -6"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">

        <a-sphere radius="0.5" position="4 0 0" src="#planet3Tex"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-sphere>

      </a-entity>

      <!-- PLANET 4 -->
      <a-entity position="0 1.6 -6"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 15000">

        <a-sphere radius="0.6" position="5 0 0" src="#planet4Tex"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-sphere>

      </a-entity>

      <!-- LIGHT -->
      <a-light type="point" position="0 1.6 -6" intensity="2"></a-light>

      <!-- CAMERA + CONTROLS -->
      <a-entity camera wasd-controls look-controls position="0 1.6 2"></a-entity>

      <!-- SKY -->
      <a-sky color="#000000"></a-sky>

    </a-scene>

  </body>
</html>
